<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Web AR — หน้าว่าง</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(circle at 50% 25%, #1b2735, #090a0f); color: #fff; }
    .wrap { min-height: 100%; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 18px; padding: 24px; text-align: center; }
    h1 { font-size: 22px; font-weight: 600; }
    p { font-size: 14px; opacity: .65; max-width: 320px; line-height: 1.5; }
    a.back { margin-top: 8px; text-decoration: none; color: #fff; font-size: 15px; font-weight: 600;
      padding: 12px 26px; border-radius: 999px;
      background: linear-gradient(135deg, #6d5efc, #46b1ff);
      box-shadow: 0 8px 24px rgba(70,177,255,.4); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>✨ หน้าว่าง</h1>
    <p>ยังไม่มีเนื้อหา — หน้านี้เว้นไว้สำหรับใส่ฟีเจอร์ภายหลัง</p>
    <a class="back" href="/">‹ กลับเมนูหลัก</a>
  </div>
</body>
</html>
