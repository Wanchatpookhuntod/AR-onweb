<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Web AR — เมนูหลัก</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(circle at 50% 25%, #1b2735, #090a0f); color: #fff; }
    .wrap { min-height: 100%; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 26px; padding: 24px; text-align: center; }
    h1 { font-size: 24px; font-weight: 700; }
    .sub { font-size: 14px; opacity: .7; max-width: 340px; line-height: 1.5; }
    .menu { display: flex; flex-direction: column; gap: 16px; width: 100%; max-width: 360px; }
    .card {
      display: flex; align-items: center; gap: 16px; text-decoration: none; color: #fff;
      padding: 20px 22px; border-radius: 18px; border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.04); transition: transform .15s ease, background .15s ease;
    }
    .card:active { transform: scale(.98); }
    .card .icon {
      width: 52px; height: 52px; flex: none; border-radius: 14px;
      display: grid; place-items: center; font-size: 26px;
    }
    .card .txt { text-align: left; }
    .card .txt .t { font-size: 17px; font-weight: 600; }
    .card .txt .d { font-size: 12px; opacity: .6; margin-top: 2px; }
    .card .arrow { margin-left: auto; opacity: .4; font-size: 20px; }

    .card.ar { background: linear-gradient(135deg, rgba(109,94,252,.22), rgba(70,177,255,.22));
      border-color: rgba(70,177,255,.35); }
    .card.ar .icon { background: linear-gradient(135deg, #6d5efc, #46b1ff); }
    .card.blank .icon { background: rgba(255,255,255,.1); }

    .foot { font-size: 12px; opacity: .45; }
  </style>
</head>
<body>
  <div class="wrap">
    <div>
      <h1>🪐 Web AR</h1>
      <p class="sub">เลือกเมนูที่ต้องการ</p>
    </div>

    <nav class="menu">
      <a class="card ar" href="/ar">
        <div class="icon">👋</div>
        <div class="txt">
          <div class="t">เริ่ม AR</div>
          <div class="d">พรีวิว + วางโมเดลในโลกจริง (iOS + Android)</div>
        </div>
        <div class="arrow">›</div>
      </a>

      <a class="card blank" href="/page2">
        <div class="icon">⚔️</div>
        <div class="txt">
          <div class="t">ตามรอยพระเจ้าตาก</div>
          <div class="d">World AR — GPS + เข็มทิศ ส่องหาสถานที่ประวัติศาสตร์</div>
        </div>
        <div class="arrow">›</div>
      </a>
    </nav>

    <p class="foot">iOS 12+ Safari / Android 8+ Chrome</p>
  </div>
</body>
</html>
